name: secure_exam_browser
description: A cross-platform secure exam browser for Moodle with OS-level lockdown.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.14.0
  webview_flutter_wkwebview: ^3.25.1
  webview_flutter_android: ^4.12.0
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.5+1
  camera: ^0.12.0+1
  permission_handler: ^12.0.3
  path_provider: ^2.1.6
  http: ^1.6.0
  uuid: ^4.5.3
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
