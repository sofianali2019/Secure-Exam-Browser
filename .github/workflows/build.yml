name: Build Secure Exam Browser

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.16.x
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.16.x
      - run: flutter pub get
      - run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.16.x
          architecture: x64
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.16.x
      - run: flutter pub get
      - run: flutter build windows --release --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/runner/Release/

  build-macos:
    name: Build macOS
    runs-on: macos-14
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.16.x
          architecture: x64
      - run: flutter pub get
      - run: flutter build macos --release --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: build/macos/Build/Products/Release/
